# Mirror a 128x64 SSD1306 to a browser on http://<device-ip>:8080/
#
# The display's own `contrast:` setting is applied by the panel itself and is not
# readable back, so the viewer cannot know about it. If you drive contrast from
# a lambda or a number, feed the same value to `contrast_lambda` and the browser
# will match what your eyes see on the glass.

esphome:
  name: wemos-oled
  friendly_name: Wemos OLED

esp8266:
  board: d1_mini

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://kaboom748/oled_stream
    components: [oled_stream]
    refresh: 1d

globals:
  - id: current_contrast
    type: float
    restore_value: false
    initial_value: "1.0"

i2c:
  sda: GPIO4
  scl: GPIO5

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    contrast: 100%
    update_interval: 200ms
    lambda: |-
      it.printf(0, 0, id(roboto), "Hello");

font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 20

oled_stream:
  - display_id: oled_display
    port: 8080
    contrast_lambda: |-
      return id(current_contrast);
